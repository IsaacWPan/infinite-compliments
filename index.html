<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Have A Nice Day</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  text-align: center;
}

.container {
  max-width: 600px;
}

h1 {
  font-size: 2.5rem;
}

#compliment {
  margin: 30px 0;
  font-size: 1.4rem;
  min-height: 80px;
}

button {
  padding: 12px 25px;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: white;
  color: #764ba2;
  font-weight: bold;
  transition: 0.2s ease;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <h1>✨ Have A Nice Day ✨</h1>
  <div id="compliment">Click the button to receive a compliment.</div>
  <button onclick="generateCompliment()">Generate Compliment</button>
</div>

<div id="easterEgg" onclick="toggleMode()" style="
position: fixed;
bottom: 15px;
right: 15px;
font-size: 18px;
cursor: pointer;
opacity: 0.3;
user-select: none;
">
★
</div>

<div id="modeDisplay" style="
position: fixed;
bottom: 45px;
right: 15px;
font-size: 12px;
font-family: monospace;
opacity: 0;
transition: opacity 0.4s ease;
">
Mode: Unknown
</div>

<script>

// =====================
// DATA
// =====================

const traits = ["quiet confidence","creative genius","natural leadership"];
const metaphors = ["a lighthouse in a storm","a rare constellation","a perfectly tuned symphony"];
const endings = ["and people feel it instantly.","and it changes the energy in every room.","and it makes the world better."];

const poeticOpenings = ["In quiet moments,","Where others hesitate,","Against the current,"];
const poeticBodies = ["you rise steadily","your presence feels grounded","you move with calm strength"];
const poeticEndings = ["and it lingers long after.","and something shifts quietly.","and even silence listens."];

const punchyCompliments = ["You are built different.","Elite energy.","Top tier."];
const brutalistCompliments = ["You endure.","You adapt.","You persist."];
const aspirationalCompliments = ["Have a powerful day.","Keep going — it’s working.","Move with intention."];

// =====================
// MEMORY
// =====================

let usageMap = new Map();
let currentModeName = "";
let modeVisible = false;

// =====================
// WEIGHTED MODE
// =====================

function getWeightedMode() {
  const r = Math.random();
  if (r < 0.40) return 0;
  if (r < 0.80) return 1;
  if (r < 0.867) return 2;
  if (r < 0.934) return 3;
  return 4;
}

// =====================
// SMART RANDOM
// =====================

function smartRandomItem(array) {
  const weights = array.map(item => {
    const used = usageMap.get(item) || 0;
    return 1 / (1 + used);
  });

  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let random = Math.random() * totalWeight;

  for (let i = 0; i < array.length; i++) {
    if (random < weights[i]) {
      const chosen = array[i];
      usageMap.set(chosen, (usageMap.get(chosen) || 0) + 1);
      return chosen;
    }
    random -= weights[i];
  }
}

// =====================
// GENERATOR
// =====================

function generateCompliment() {

  const mode = getWeightedMode();
  let compliment = "";

  if (mode === 0) {
    currentModeName = "Classic";
    compliment =
      "You have the " +
      smartRandomItem(traits) +
      " of " +
      smartRandomItem(metaphors) +
      ", " +
      smartRandomItem(endings);
  }

  else if (mode === 1) {
    currentModeName = "Poetic";
    compliment =
      smartRandomItem(poeticOpenings) + " " +
      smartRandomItem(poeticBodies) + ", " +
      smartRandomItem(poeticEndings);
  }

  else if (mode === 2) {
    currentModeName = "Punchy";
    compliment = smartRandomItem(punchyCompliments);
  }

  else if (mode === 3) {
    currentModeName = "Minimal";
    compliment = smartRandomItem(brutalistCompliments);
  }

  else {
    currentModeName = "Aspirational";
    compliment = smartRandomItem(aspirationalCompliments);
  }

  document.getElementById("compliment").innerText = compliment;
  document.getElementById("modeDisplay").innerText = "Mode: " + currentModeName;
}

// =====================
// EASTER EGG
// =====================

function toggleMode() {
  modeVisible = !modeVisible;
  const display = document.getElementById("modeDisplay");
  display.style.opacity = modeVisible ? "0.6" : "0";
}

</script>

</body>
</html>
