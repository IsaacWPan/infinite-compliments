    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

function generateCompliment() {

  const mode = Math.floor(Math.random() * 5);
  let compliment = "";

  if (mode === 0) {
    currentModeName = "Classic";
    compliment =
      "You have the " +
      randomItem(traits) +
      " of " +
      randomItem(metaphors) +
      ", " +
      randomItem(endings);
  }

  else if (mode === 1) {
    currentModeName = "Poetic";
    compliment =
      randomItem(poeticOpenings) + " " +
      randomItem(poeticBodies) + ", " +
      randomItem(poeticEndings);
  }

  else if (mode === 2) {
    currentModeName = "Punchy";
    compliment = randomItem(punchyCompliments);
  }

  else if (mode === 3) {
    currentModeName = "Brutalist";
    compliment = randomItem(brutalistCompliments);
  }

  else {
    currentModeName = "Aspirational";
    compliment = randomItem(aspirationalCompliments);
  }

  document.getElementById("compliment").innerText = compliment;
  document.getElementById("modeDisplay").innerText = "Mode: " + currentModeName;
}
    function toggleMode() {
  modeVisible = !modeVisible;
  const display = document.getElementById("modeDisplay");

  if (modeVisible) {
    display.style.opacity = "0.6";
  } else {
    display.style.opacity = "0";
  }
}
